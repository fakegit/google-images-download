site_name: Google Images Download
site_description: Python Script for searching and downloading hundreds of images from Google
site_author: Hardik Vasa
site_url: https://hardikvasa.github.io/google-images-download/

repo_name: hardikvasa/google-images-download
repo_url: https://github.com/hardikvasa/google-images-download
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hardikvasa/google-images-download
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/google-images-download/

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Arguments: arguments.md
  - Examples: examples.md
  - Troubleshooting: troubleshooting.md
  - Workflow: structure.md

copyright: Copyright &copy; 2024 Hardik Vasa
